version: '2'
services:
  core-mysql:
    container_name: mysql-${TAG}
    hostname: mysql
    image: mysql:5.7
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/mysql.conf.d
      - ./mysql/script:/docker-entrypoint-initdb.d/
      - /etc/localtime:/etc/localtime:ro
    restart: always
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=123456

  core-redis:
    container_name: redis-${TAG}
    hostname: redis
    image: redis:6.0.9
    ports:
      - "6379:6379"
    volumes: 
      - ./redis/redis.conf:/etc/redis/redis.conf
      - ./redis/data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always
    network_mode: host
    
